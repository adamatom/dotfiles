# use 'ctrl-b b' to send the prefix to a nested tmux session.
bind b send-prefix

# Improve colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Keep enough history for real work without letting long-lived panes balloon
# the server over time.
set -g history-limit 20000

# Enable mouse support
set -g mouse on

# Bar on bottom
set-option -g status-position bottom

# Dont set the clipboard using xterm escape sequences
set-option -s set-clipboard off

# Vim keys in copy mode
set-window-option -g mode-keys vi

# Allow a short delay for tmux to distinguish bare Escape from function-key sequences.
set -sg escape-time 100

# Enter copy mode with familiar keys.
bind Escape copy-mode
bind [ copy-mode
bind C-u copy-mode

# Copy-mode selections
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "which_clip.sh"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "which_clip.sh"

# Minimal status line
set -g status-fg brightblue
set -g status-bg black
set-window-option -g window-status-style fg=brightblue,bg=black
set-window-option -g window-status-current-style fg=white,bg=black
set -g status-left-length 0
set -g status-left ""
set -g status-right-length 40
set -g status-right "#{=40:pane_title}"

# Update often enough to track rename/title changes without redrawing constantly.
set-option -g status-interval 5
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{?#{||:#{==:#{pane_current_command},zsh},#{||:#{==:#{pane_current_command},vim},#{==:#{pane_current_command},nvim}}},#{b:pane_current_path},#{pane_current_command}}'

# Reload configuration file from within TMUX
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Start window indexing at one instead of zero
set -g base-index 1
set -g renumber-windows on

# Humane split keys: s for stacked/top-bottom, v for vertical divider/side-by-side.
unbind '"'
unbind %
bind s split-window -v
bind v split-window -h

# Pane navigation with hjkl
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Pane rearrangement
unbind \{
unbind \}
bind -r H swap-pane -U
bind -r L swap-pane -D

# Window navigation and ordering
bind -r n next-window
bind -r p previous-window
bind -r C-h swap-window -t -1 \; select-window -t -1
bind -r C-l swap-window -t +1 \; select-window -t +1

# Pane/window lifecycle
bind c new-window
bind x kill-pane
bind X kill-window
bind z resize-pane -Z

# Choose-tree stays on Space; layout cycle moves to w.
bind -r w next-layout
bind -r Space choose-tree -Zw
bind -r C-Space choose-tree -Zw

# Show/Hide scratch popup window with <leader>f
bind f if-shell -F '#{==:#{session_name},scratch}' {
    detach-client
} {
    display-popup -E "tmux new-session -A -s scratch"
}

# Rename helpers
bind , command-prompt -I "#W" "rename-window -- '%%'"
